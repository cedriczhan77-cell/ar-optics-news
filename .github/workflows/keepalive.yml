name: 保持定时任务活跃

on:
  # 每周一 UTC 00:00（北京时间 08:00）自动运行
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Keep alive commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 更新时间戳文件，制造 commit 保持仓库活跃
          echo "keepalive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive [skip ci]"
          git push
