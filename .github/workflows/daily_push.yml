name: AR光学 每日资讯推送

on:
  # 每天北京时间 07:30（UTC 前一天 23:30）
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      # LibreOffice: PPTX→PDF  |  poppler: PDF→图片  |  noto-cjk: 中文字体
      - name: Install system tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libreoffice poppler-utils fonts-noto-cjk
          fc-cache -fv

      - name: Install Python dependencies
        run: pip install feedparser requests

      - name: Install Node.js dependencies
        run: |
          echo '{"name":"ar-daily","version":"1.0.0"}' > package.json
          npm install pptxgenjs

      # 飞书群收到：标题 + 「查看完整日报」按钮 + 日报图片
      - name: Generate & push image daily report
        env:
          FEISHU_WEBHOOK:      ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_WEBHOOK_2:    ${{ secrets.FEISHU_WEBHOOK_2 }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python slide_pusher.py

      - name: Save history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add slide_history.json
          git diff --cached --quiet || git commit -m "chore: update history [skip ci]"
          git push
