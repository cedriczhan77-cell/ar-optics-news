name: AR光学 每日资讯推送

on:
  # ── 每天北京时间 07:00（UTC 前一天 23:00）──────────
  schedule:
    - cron: "00 23 * * *"
  # 手动触发（测试用）
  workflow_dispatch:

permissions:
  contents: write   # 需要写权限把历史文件 commit 回仓库

jobs:
  daily-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # 首次安装 LibreOffice 约需 10 分钟

    steps:
      # ── 1. 检出代码 ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # ── 2. Python 环境 ───────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      # ── 3. Node.js 环境（用于生成 PPT）──────────
      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"

      # ── 4. 安装系统工具（LibreOffice + poppler + 中文字体）─
      #    LibreOffice：PPTX → PDF
      #    poppler-utils：PDF → 图片（pdftoppm）
      #    fonts-noto-cjk：中文字体（防止乱码）
      - name: Install system tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libreoffice poppler-utils fonts-noto-cjk
          fc-cache -fv

      # ── 5. 安装 Python 依赖 ───────────────────────
      - name: Install Python dependencies
        run: pip install feedparser requests

      # ── 6. 安装 Node.js 依赖（本地安装，确保脚本能找到）─
      - name: Install Node.js dependencies
        run: |
          echo '{"name":"ar-daily","version":"1.0.0"}' > package.json
          npm install pptxgenjs

      # ── 7. 运行文字日报（news_pusher.py）────────
      #    推送：飞书文字卡片（总结 + 文献 + 新闻列表）
      - name: Push text daily report
        env:
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_WEBHOOK_2:  ${{ secrets.FEISHU_WEBHOOK_2 }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_pusher.py

      # ── 8. 运行图片日报（slide_pusher.py）────────
      #    推送：Goerpixel 风格白底日报图片（直接显示在飞书群组）
      - name: Generate & push image daily report
        env:
          FEISHU_WEBHOOK:      ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_WEBHOOK_2:    ${{ secrets.FEISHU_WEBHOOK_2 }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
        run: python slide_pusher.py

      # ── 9. 保存两个历史文件，防止明日重复推送 ────
      - name: Save history files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json slide_history.json
          git diff --cached --quiet || git commit -m "chore: update history [skip ci]"
          git push
