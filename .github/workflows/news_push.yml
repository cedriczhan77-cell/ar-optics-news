name: 光学 & AR 资讯日报

on:
  # 每天北京时间 07:30（UTC 23:30）
  schedule:
    - cron: "30 23 * * *"
  # 手动触发（测试用）
  workflow_dispatch:

permissions:
  contents: write   # 需要写权限把 sent_history.json commit 回仓库

jobs:
  push-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run pusher
        env:
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python news_pusher.py

      # 把更新后的历史文件 commit 回仓库，防止重复推送
      - name: Save sent history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json
          git diff --cached --quiet || git commit -m "chore: update sent_history [skip ci]"
          git push
